<section class="welcome-screen" aria-label="Welcome screen">
  <div class="language-selector">
    <select class="lang-select" [value]="currentLang" (change)="switchLanguage($any($event.target).value)">
      <option value="en">{{ 'LANGUAGE.ENGLISH' | translate }}</option>
      <option value="ka">{{ 'LANGUAGE.GEORGIAN' | translate }}</option>
    </select>
  </div>
  <div class="welcome-content">
    <a class="enter-btn" routerLink="/mainpage">{{ 'WELCOME.ENTER' | translate }}</a>
  </div>
</section>
